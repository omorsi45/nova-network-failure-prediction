name: Bug report
description: Report a problem or regression
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include a clear description and expected behavior.
      placeholder: "When I run ..., it ..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.7"

